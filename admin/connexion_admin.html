<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifumi Battle Arena - ADMIN PANEL</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../admin/assets/css/style.css">




  <!-- Favicon classique (format ICO) - La plus compatible -->
  <link rel="shortcut icon" href="../admin/logobg.png" type="image/x-icon">

  <!-- Favicons pour les navigateurs modernes (format PNG) -->
  <link rel="icon" type="image/png" sizes="16x16" href="logobg.png">
  <link rel="icon" type="image/png" sizes="32x32" href="logobg.png">

  <!-- Icône pour les appareils Apple (iPhone, iPad) -->
  <link rel="apple-touch-icon" sizes="180x180" href="logobg.png">

  <!-- Manifeste pour les applications web progressives (PWA) -->
  <link rel="manifest" href="/site.webmanifest">

  <!-- Couleur de thème pour la barre d'adresse du navigateur mobile -->
  <meta name="theme-color" content="#02b7f5">
</head>
<body>

    <section>

        <!-- ===== PARTIE GAUCHE — image + titre ===== -->
        <div class="bg-image">
            <div class="title">
                <p class="title-para orb">SBA</p>
                <h1 class="uppercase orb">Shifumi Battle Arena</h1>
                <p class="title-text outfit">Bienvenue administrateur du jeu</p>
            </div>
        </div>

        <!-- ===== PARTIE DROITE — formulaires ===== -->
        <div class="forms">

            <!-- Boutons switch -->
            <div class="center">
                <button class="btn orb active" id="btn-connexion">Connexion</button>
            </div>

            <!-- Formulaire de connexion -->
            <div class="connexion active" id="form-connexion">
                <form class="connexion-form" onsubmit="handleConnexion(event)">
                    <div class="connexion-title">
                        <h1 class="raj">Content de te revoir, administrateur !</h1>
                        <p class="outfit">Les duels continuent, les esprits se défient ! <br>
                            Mais c'est toi l'arbitre
                        </p>
                    </div>

                    <div class="field-group">
                        <label class="outfit">Email</label>
                        <input type="email" id="login-email" placeholder="marcel@gmail.com">
                    </div>

                    <div class="field-group">
                        <label class="outfit">Mot de passe</label>
                        <input type="password" id="login-password" placeholder="●●●●●●●●">
                    </div>

                    <button type="submit" class="submit orb">Se connecter</button>
                </form>
            </div>


        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../admin/assets/js/auth.js"></script>
</body>
</html>
