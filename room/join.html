<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIFUMI BATTLE ARENA · Rejoindre</title>

  <link rel="shortcut icon" href="../logobg.png" type="image/x-icon">
  <meta name="theme-color" content="#02b7f5">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        colors: { primary: '#02b7f5', win: '#22c55e', lose: '#ef4444', draw: '#f59e0b' },
        fontFamily: {
          orbitron: ['Orbitron','sans-serif'],
          rajdhani: ['Rajdhani','sans-serif'],
          outfit:   ['Outfit','sans-serif']
        }
      }}
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.8);} }
    .dot { animation: pulse-dot 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes glow {
      0%,100% { box-shadow: 0 0 20px rgba(168,85,247,0.4); }
      50%      { box-shadow: 0 0 50px rgba(168,85,247,0.8); }
    }
    .icon-glow { animation: glow 2s ease-in-out infinite; }
  </style>
</head>

<body class="dark:bg-[#0a0f1e] bg-[#f0f9ff] font-outfit antialiased"
      style="visibility:hidden; opacity:0; transition:opacity 0.3s ease">

  <div class="min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo -->
    <div class="flex items-center gap-2 mb-12 opacity-60">
      <img src="../logobg.png" alt="" class="w-8 h-8 object-contain">
      <span class="font-orbitron font-bold text-primary text-sm">SHIFUMI BATTLE ARENA</span>
    </div>

    <!-- STATE : loading (défaut) -->
    <div id="state-loading" class="fade-in text-center">
      <div class="w-24 h-24 rounded-full bg-gradient-to-br from-[#a855f7] to-[#7c3aed]
                  flex items-center justify-center mx-auto mb-6 icon-glow">
        <i class="fa-solid fa-gamepad text-white text-4xl"></i>
      </div>
      <h1 class="font-orbitron font-black text-xl md:text-2xl dark:text-white text-[#0a0f1e] mb-3">
        Connexion à la partie…
      </h1>
      <p class="font-rajdhani dark:text-[#94a3b8] text-[#475569] text-sm mb-8">
        Prépare-toi, la partie va commencer !
      </p>
      <div class="flex justify-center gap-2.5">
        <span class="dot w-3 h-3 rounded-full bg-primary"></span>
        <span class="dot w-3 h-3 rounded-full bg-primary"></span>
        <span class="dot w-3 h-3 rounded-full bg-primary"></span>
      </div>
    </div>

    <!-- STATE : succès -->
    <div id="state-success" class="hidden text-center">
      <div class="w-24 h-24 rounded-full bg-[rgba(34,197,94,0.15)] border-2 border-win
                  flex items-center justify-center mx-auto mb-6">
        <i class="fa-solid fa-check text-win text-4xl"></i>
      </div>
      <h1 class="font-orbitron font-bold text-xl dark:text-white text-[#0a0f1e] mb-2">
        C'est parti !
      </h1>
      <p class="font-rajdhani dark:text-[#94a3b8] text-[#475569] text-sm">
        Redirection vers la partie…
      </p>
    </div>

    <!-- STATE : erreur -->
    <div id="state-error" class="hidden text-center max-w-xs">
      <div class="w-24 h-24 rounded-full bg-[rgba(239,68,68,0.1)] border-2 border-lose
                  flex items-center justify-center mx-auto mb-6">
        <i class="fa-solid fa-triangle-exclamation text-lose text-4xl"></i>
      </div>
      <h1 class="font-orbitron font-bold text-lg dark:text-white text-[#0a0f1e] mb-2">
        Salle introuvable
      </h1>
      <p id="error-msg" class="font-rajdhani dark:text-[#94a3b8] text-[#475569] text-sm mb-6">
        Cette salle est expirée, pleine ou n'existe pas.
      </p>
      <a href="../player/dashboard.html"
        class="inline-flex items-center gap-2 px-6 py-3 rounded-full
               bg-gradient-to-r from-[#02b7f5] to-[#0066ff] text-white
               font-orbitron font-bold text-sm hover:brightness-110 transition">
        <i class="fa-solid fa-arrow-left"></i> Retour
      </a>
    </div>

    <!-- STATE : pas de code -->
    <div id="state-nocode" class="hidden text-center max-w-xs">
      <div class="w-24 h-24 rounded-full dark:bg-[rgba(255,255,255,0.06)] bg-[rgba(0,0,0,0.06)]
                  flex items-center justify-center mx-auto mb-6">
        <i class="fa-solid fa-link-slash dark:text-[#475569] text-[#94a3b8] text-4xl"></i>
      </div>
      <h1 class="font-orbitron font-bold text-lg dark:text-white text-[#0a0f1e] mb-2">
        Lien invalide
      </h1>
      <p class="font-rajdhani dark:text-[#94a3b8] text-[#475569] text-sm mb-6">
        Demande un nouveau lien à ton adversaire.
      </p>
      <a href="../player/dashboard.html"
        class="inline-flex items-center gap-2 px-6 py-3 rounded-full
               bg-gradient-to-r from-[#02b7f5] to-[#0066ff] text-white
               font-orbitron font-bold text-sm hover:brightness-110 transition">
        <i class="fa-solid fa-arrow-left"></i> Retour
      </a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../room/assets/js/join.js"></script>
</body>
</html>
