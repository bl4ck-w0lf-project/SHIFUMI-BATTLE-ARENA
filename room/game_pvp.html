<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIFUMI BATTLE ARENA · PvP</title>

  <link rel="shortcut icon" href="../logobg.png" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="../logobg.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../logobg.png">
  <meta name="theme-color" content="#02b7f5">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#02b7f5',
            'primary-dark': '#0066ff',
            win:  '#22c55e',
            lose: '#ef4444',
            draw: '#f59e0b',
          },
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
            rajdhani: ['Rajdhani', 'sans-serif'],
            outfit:   ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    .avatar-ping::after {
      content: ''; position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border-radius: 50%; border: 2px solid #02b7f5;
      animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
    }
    @keyframes ping { 75%, 100% { transform: scale(1.5); opacity: 0; } }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    .modal-box { animation: modalIn 0.25s cubic-bezier(0.175,0.885,0.32,1.275); }

    .choice-card {
      transition: transform 0.2s, box-shadow 0.3s, border-color 0.2s, opacity 0.2s;
      cursor: pointer;
    }
    .choice-card:hover:not(.disabled) {
      transform: scale(1.06);
      border-color: #02b7f5 !important;
      box-shadow: 0 0 25px rgba(2,183,245,0.4);
    }
    .choice-card.selected {
      border-color: #02b7f5 !important;
      box-shadow: 0 0 30px rgba(2,183,245,0.6);
      transform: scale(1.04);
    }
    .choice-card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .countdown-ring { transition: stroke-dashoffset 0.25s linear; }
    .countdown-danger { color: #ef4444 !important; animation: pulseDanger 0.5s ease infinite; }
    @keyframes pulseDanger { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .round-dot { width:10px; height:10px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); transition:all 0.3s; }
    .round-dot.win  { background:#22c55e; border-color:#22c55e; }
    .round-dot.lose { background:#ef4444; border-color:#ef4444; }
    .round-dot.draw { background:#94a3b8; border-color:#94a3b8; }
    .round-dot.current { border-color:#02b7f5; box-shadow:0 0 8px rgba(2,183,245,0.6); }

    #countdown-bar { transition: width 0.25s linear; }
    .bar-danger { background: #ef4444 !important; }

    @keyframes waitPulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .wait-pulse { animation: waitPulse 1.5s ease-in-out infinite; }
  </style>
</head>

<body class="dark:bg-[#0a0f1e] bg-[#f0f9ff] dark:text-white text-[#0a0f1e] font-outfit antialiased"
      style="visibility:hidden; opacity:0; transition:opacity 0.25s ease">

  <!-- MODAL ABANDON -->
  <div id="modal-abandon" class="modal-overlay hidden">
    <div class="modal-box dark:bg-[#0d1b2a] bg-white rounded-2xl p-8 max-w-sm w-full mx-4
                border dark:border-[rgba(239,68,68,0.2)] border-[rgba(239,68,68,0.3)] shadow-2xl text-center">
      <div class="w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-flag text-red-500 text-2xl"></i>
      </div>
      <h2 class="font-orbitron font-bold text-xl dark:text-white text-[#0a0f1e] mb-2">Abandonner ?</h2>
      <p class="font-rajdhani text-base dark:text-[#94a3b8] text-[#475569] mb-6">
        Tu seras déclaré perdant et la partie sera terminée.
      </p>
      <div class="flex gap-3 justify-center">
        <button id="btn-abandon-cancel"
          class="flex-1 px-5 py-3 rounded-full border dark:border-[#94a3b8] border-[#475569]
                 dark:text-[#94a3b8] text-[#475569] font-rajdhani font-semibold
                 hover:border-primary hover:text-primary transition">
          <i class="fa-solid fa-shield-halved mr-1"></i> CONTINUER
        </button>
        <button id="btn-abandon-confirm"
          class="flex-1 px-5 py-3 rounded-full bg-gradient-to-r from-red-500 to-red-700
                 text-white font-orbitron font-semibold hover:brightness-110 transition">
          <i class="fa-solid fa-flag mr-1"></i> ABANDONNER
        </button>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 w-full h-16 px-4 md:px-8 flex items-center justify-between z-50
              dark:bg-[#0a0f1e]/95 bg-white/95 backdrop-blur-md
              border-b dark:border-[rgba(2,183,245,0.2)] border-[rgba(2,183,245,0.25)]">
    <div class="flex items-center gap-3">
      <div class="relative">
        <div id="nav-avatar"
          class="w-10 h-10 rounded-full bg-gradient-to-br from-[#02b7f5] to-[#0066ff]
                 flex items-center justify-center text-white font-orbitron text-xs font-bold
                 ring-2 ring-[#02b7f5] ring-offset-2 dark:ring-offset-[#0a0f1e] overflow-hidden">??</div>
        <div class="avatar-ping absolute inset-0"></div>
      </div>
      <div class="leading-tight hidden sm:block">
        <div id="nav-name" class="font-outfit font-semibold dark:text-white text-[#0a0f1e] text-sm">Chargement...</div>
        <div id="nav-username" class="font-rajdhani text-xs dark:text-[#a855f7] text-[#7c3aed]"></div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <img src="../logobg.png" alt="" width="36px">
      <span class="hidden md:block font-orbitron font-bold text-base text-primary">SHIFUMI BATTLE ARENA</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeToggle"
        class="w-9 h-9 rounded-full border dark:border-[rgba(2,183,245,0.3)] border-[rgba(2,183,245,0.3)]
               flex items-center justify-center hover:bg-[rgba(2,183,245,0.1)] transition">
        <i id="themeIcon" class="fa-solid fa-moon text-primary"></i>
      </button>
      <button id="btn-abandon"
        class="flex items-center gap-2 px-3 py-2 rounded-full border
               dark:border-red-500/40 border-red-500/40 dark:text-red-400 text-red-500
               font-rajdhani text-sm font-semibold hover:dark:bg-[rgba(239,68,68,0.1)] transition">
        <i class="fa-solid fa-flag"></i>
        <span class="hidden sm:inline">Abandonner</span>
      </button>
    </div>
  </nav>

  <main class="pt-16 min-h-screen px-4 py-6 max-w-2xl mx-auto">

    <!-- BADGE MODE -->
    <div class="text-center mb-4 mt-2">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full
                  dark:bg-[rgba(168,85,247,0.1)] bg-[rgba(168,85,247,0.08)]
                  border dark:border-[rgba(168,85,247,0.2)] border-[rgba(168,85,247,0.25)]">
        <i class="fa-solid fa-users text-[#a855f7] text-xs"></i>
        <span class="font-rajdhani font-semibold text-xs text-[#a855f7]">MODE MULTIJOUEUR</span>
        <span class="font-rajdhani text-xs dark:text-[#475569] text-[#94a3b8]">·</span>
        <span id="room-code-badge" class="font-orbitron text-xs text-[#a855f7]">—</span>
      </div>
    </div>

    <!-- PROGRESSION -->
    <div class="dark:bg-[#0d1b2a] bg-white rounded-2xl border
                dark:border-[rgba(2,183,245,0.15)] border-[rgba(2,183,245,0.25)] p-4 mb-4">
      <div class="flex items-center justify-between mb-2">
        <span class="font-rajdhani text-xs uppercase tracking-widest dark:text-[#94a3b8] text-[#475569]">
          <i class="fa-solid fa-flag-checkered mr-1"></i> Progression
        </span>
        <span id="round-counter" class="font-orbitron text-sm font-bold text-primary">Round 1 / 5</span>
      </div>
      <div id="rounds-dots" class="flex gap-2 flex-wrap justify-center"></div>
    </div>

    <!-- SCORES -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="text-center p-4 rounded-2xl border-2
                  dark:bg-[rgba(2,183,245,0.08)] bg-[rgba(2,183,245,0.05)]
                  dark:border-[#02b7f5] border-[#02b7f5]">
        <div class="font-rajdhani text-xs uppercase dark:text-[#02b7f5] text-[#0288d1] mb-1">
          <i class="fa-solid fa-user mr-1"></i> TOI
        </div>
        <div id="score-me" class="font-orbitron text-3xl font-bold dark:text-white text-[#0a0f1e]">0</div>
      </div>
      <div class="text-center p-4 rounded-2xl border dark:bg-[rgba(148,163,184,0.08)] bg-[rgba(148,163,184,0.05)]
                  dark:border-[rgba(148,163,184,0.3)] border-[rgba(148,163,184,0.3)]">
        <div class="font-rajdhani text-xs uppercase dark:text-[#94a3b8] text-[#64748b] mb-1">
          <i class="fa-solid fa-handshake mr-1"></i> NULS
        </div>
        <div id="score-draw" class="font-orbitron text-3xl font-bold dark:text-white text-[#0a0f1e]">0</div>
      </div>
      <div class="text-center p-4 rounded-2xl border-2
                  dark:bg-[rgba(168,85,247,0.08)] bg-[rgba(168,85,247,0.05)]
                  dark:border-[#a855f7] border-[#a855f7]">
        <div class="font-rajdhani text-xs uppercase text-[#a855f7] mb-1">
          <i class="fa-solid fa-user-ninja mr-1"></i>
          <span id="opponent-label">ADV</span>
        </div>
        <div id="score-opp" class="font-orbitron text-3xl font-bold dark:text-white text-[#0a0f1e]">0</div>
      </div>
    </div>

    <!-- COUNTDOWN -->
    <div class="flex flex-col items-center mb-4">
      <div class="relative w-24 h-24 mb-2">
        <svg class="w-full h-full" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(2,183,245,0.15)" stroke-width="8"/>
          <circle id="countdown-ring" cx="50" cy="50" r="44" fill="none"
                  stroke="#02b7f5" stroke-width="8" stroke-linecap="round"
                  stroke-dasharray="276.46" stroke-dashoffset="0"
                  class="countdown-ring"
                  style="transform:rotate(-90deg);transform-origin:50% 50%"/>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
          <span id="countdown-number" class="font-orbitron font-black text-3xl text-primary">–</span>
        </div>
      </div>
      <div class="w-full h-1.5 dark:bg-[rgba(255,255,255,0.06)] bg-[rgba(0,0,0,0.06)] rounded-full overflow-hidden">
        <div id="countdown-bar" class="h-full bg-primary rounded-full" style="width:100%"></div>
      </div>
    </div>

    <!-- CARTES DE CHOIX -->
    <div class="flex justify-center gap-3 md:gap-4 mb-4">
      <div class="choice-card relative w-28 h-32 p-2 rounded-xl border-2
                  flex flex-col items-center justify-between
                  dark:bg-[#0d1b2a] bg-white
                  dark:border-[rgba(2,183,245,0.2)] border-[rgba(2,183,245,0.3)] shadow-lg"
           data-move="rock">
        <svg width="60" height="60" viewBox="0 0 256 256" fill="#02b7f5" class="mt-1">
          <path d="M200,80H184V64a31.97943,31.97943,0,0,0-56-21.13208A31.97443,31.97443,0,0,0,72.20508,60.4231,31.978,31.978,0,0,0,24,88v40a104,104,0,0,0,208,0V112A32.03635,32.03635,0,0,0,200,80ZM152,48a16.01833,16.01833,0,0,1,16,16V80H136V64A16.01833,16.01833,0,0,1,152,48ZM88,64a16,16,0,0,1,32,0v40a16,16,0,0,1-32,0V64ZM40,88a16,16,0,0,1,32,0v16a16,16,0,0,1-32,0Zm88,128a88.10627,88.10627,0,0,1-87.9209-84.249A31.94065,31.94065,0,0,0,80,125.13208a31.92587,31.92587,0,0,0,44.58057,3.34595,32.23527,32.23527,0,0,0,11.79443,11.4414A47.906,47.906,0,0,0,120,176a8,8,0,0,0,16,0,32.03635,32.03635,0,0,1,32-32,8,8,0,0,0,0-16H152a16.01833,16.01833,0,0,1-16-16V96h64a16.01833,16.01833,0,0,1,16,16v16A88.09957,88.09957,0,0,1,128,216Z"/>
        </svg>
        <span class="font-rajdhani text-xs uppercase tracking-wider dark:text-white text-[#0a0f1e] pb-1">PIERRE</span>
      </div>

      <div class="choice-card relative w-28 h-32 p-2 rounded-xl border-2
                  flex flex-col items-center justify-between
                  dark:bg-[#0d1b2a] bg-white
                  dark:border-[rgba(2,183,245,0.2)] border-[rgba(2,183,245,0.3)] shadow-lg"
           data-move="paper">
        <svg width="60" height="60" viewBox="0 0 485 485" fill="#02b7f5" class="mt-1">
          <path d="M382.5,69.429c-7.441,0-14.5,1.646-20.852,4.573c-4.309-23.218-24.7-40.859-49.148-40.859c-7.68,0-14.958,1.744-21.467,4.852C285.641,16.205,265.932,0,242.5,0c-23.432,0-43.141,16.206-48.533,37.995c-6.508-3.107-13.787-4.852-21.467-4.852c-27.57,0-50,22.43-50,50v122.222c-6.129-2.686-12.891-4.187-20-4.187c-27.57,0-50,22.43-50,50V354c0,72.233,58.766,131,131,131h118c72.233,0,131-58.767,131-131V119.429C432.5,91.858,410.07,69.429,382.5,69.429z M402.5,354c0,55.691-45.309,101-101,101h-118c-55.691,0-101-45.309-101-101V251.178c0-11.028,8.972-20,20-20s20,8.972,20,20v80h30V83.143c0-11.028,8.972-20,20-20s20,8.972,20,20v158.035h30V50c0-11.028,8.972-20,20-20c11.028,0,20,8.972,20,20v191.178h30V83.143c0-11.028,8.972-20,20-20s20,8.972,20,20v158.035h30v-121.75c0-11.028,8.972-20,20-20s20,8.972,20,20V354z"/>
        </svg>
        <span class="font-rajdhani text-xs uppercase tracking-wider dark:text-white text-[#0a0f1e] pb-1">FEUILLE</span>
      </div>

      <div class="choice-card relative w-28 h-32 p-2 rounded-xl border-2
                  flex flex-col items-center justify-between
                  dark:bg-[#0d1b2a] bg-white
                  dark:border-[rgba(2,183,245,0.2)] border-[rgba(2,183,245,0.3)] shadow-lg"
           data-move="scissors">

        </svg>
        <span class="font-rajdhani text-xs uppercase tracking-wider dark:text-white text-[#0a0f1e] pb-1">CISEAUX</span>
      </div>
    </div>

    <!-- ★ BOUTON VALIDER -->
    <div class="flex justify-center mb-4">
      <button id="btn-validate"
        class="px-8 py-3.5 rounded-full font-orbitron font-bold text-sm
               bg-gradient-to-r from-[#02b7f5] to-[#0066ff] text-white
               shadow-[0_4px_20px_rgba(2,183,245,0.4)]
               hover:brightness-110 hover:scale-105 transition
               disabled:opacity-30 disabled:cursor-not-allowed disabled:scale-100 disabled:brightness-100
               hidden"
        disabled>
        <i class="fa-solid fa-check mr-2"></i> JOUER CE COUP
      </button>
    </div>

    <!-- ZONE RÉSULTAT -->
    <div class="grid grid-cols-3 gap-2 mb-4 items-center">
      <div class="rounded-xl p-3 text-center
                  dark:bg-[rgba(2,183,245,0.05)] bg-[rgba(2,183,245,0.06)]
                  border border-[rgba(2,183,245,0.3)]">
        <div class="font-rajdhani text-xs uppercase text-primary mb-2">
          <i class="fa-solid fa-user mr-1"></i> MON COUP
        </div>
        <div id="my-move-display" class="flex justify-center my-1">
          <svg width="40" height="40" viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="28" stroke="#02b7f5" stroke-width="3" stroke-dasharray="6 6" fill="none"/>
            <circle cx="40" cy="40" r="4" fill="#02b7f5"/>
          </svg>
        </div>
        <div id="my-move-label" class="font-orbitron text-xs dark:text-white text-[#0a0f1e]">—</div>
        <div id="my-status" class="font-rajdhani text-[10px] text-primary mt-1 hidden wait-pulse">
          <i class="fa-solid fa-check mr-1"></i> Soumis
        </div>
      </div>

      <div class="text-center">
        <span class="font-orbitron font-black text-3xl md:text-4xl
                     bg-gradient-to-r from-primary to-[#a855f7] bg-clip-text text-transparent">VS</span>
      </div>

      <div class="rounded-xl p-3 text-center
                  dark:bg-[rgba(168,85,247,0.05)] bg-[rgba(168,85,247,0.04)]
                  border border-[rgba(168,85,247,0.3)]">
        <div class="font-rajdhani text-xs uppercase text-[#a855f7] mb-2">
          <i class="fa-solid fa-user-ninja mr-1"></i>
          <span id="opp-label-move">ADV</span>
        </div>
        <div id="opp-move-display" class="flex justify-center my-1">
          <svg width="40" height="40" viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="28" stroke="#a855f7" stroke-width="3" stroke-dasharray="6 6" fill="none"/>
            <circle cx="40" cy="40" r="4" fill="#a855f7"/>
          </svg>
        </div>
        <div id="opp-move-label" class="font-orbitron text-xs dark:text-white text-[#0a0f1e]">—</div>
        <div id="opp-status" class="font-rajdhani text-[10px] dark:text-[#475569] text-[#94a3b8] mt-1">
          En attente…
        </div>
      </div>
    </div>

    <!-- DÉCONNEXION -->
    <div id="disconnect-warning" class="hidden mb-4 p-3 rounded-xl
                dark:bg-[rgba(245,158,11,0.1)] bg-[rgba(245,158,11,0.08)]
                border dark:border-[rgba(245,158,11,0.3)] border-[rgba(245,158,11,0.3)]
                flex items-center gap-3">
      <i class="fa-solid fa-triangle-exclamation text-draw shrink-0"></i>
      <div>
        <p class="font-rajdhani font-semibold text-draw text-sm">Adversaire déconnecté</p>
        <p class="font-outfit text-xs dark:text-[#94a3b8] text-[#475569]">
          Attente… <span id="disconnect-countdown" class="text-draw font-bold">30s</span>
        </p>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../room/assets/js/game_pvp.js"></script>
</body>
